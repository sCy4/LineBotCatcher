<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>報回設定台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBFAF5;
    --ink:#1C2A39;
    --blue:#0F4C81;
    --blue-deep:#0A3A63;
    --gold:#F4D35E;
    --gold-deep:#D9B63A;
    --line:#E4E0D5;
    --line-strong:#D5D0C3;
    --muted:#6B7280;
    --danger:#B23A3A;
    --card:#FFFFFF;
  }

  *{box-sizing:border-box;}

  html,body{margin:0;padding:0;}

  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans',system-ui,-apple-system,"Noto Sans TC",sans-serif;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }

  .wrap{
    max-width:1080px;
    margin:0 auto;
    padding:40px 24px 80px;
  }

  /* ---- Header ---- */
  header.top{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:24px;
    flex-wrap:wrap;
    padding-bottom:20px;
    border-bottom:2px solid var(--ink);
    margin-bottom:32px;
  }
  .title-block h1{
    font-size:1.9rem;
    font-weight:700;
    letter-spacing:-0.01em;
    margin:0 0 4px;
  }
  .title-block .sub{
    font-size:.9rem;
    color:var(--muted);
    font-weight:500;
    margin:0;
  }
  .title-block .eyebrow{
    display:inline-block;
    font-family:'IBM Plex Mono',monospace;
    font-size:.7rem;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--blue);
    margin-bottom:8px;
  }

  .btn-add{
    font-family:'IBM Plex Sans',sans-serif;
    font-size:.92rem;
    font-weight:600;
    color:#fff;
    background:var(--blue);
    border:none;
    border-radius:8px;
    padding:11px 18px;
    cursor:pointer;
    transition:background .15s ease, transform .05s ease;
    white-space:nowrap;
  }
  .btn-add:hover{background:var(--blue-deep);}
  .btn-add:active{transform:translateY(1px);}
  .btn-add .plus{font-weight:700;margin-right:6px;}

  /* ---- Grid ---- */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(330px,1fr));
    gap:22px;
  }

  /* ---- Card ---- */
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:20px 20px 16px;
    display:flex;
    flex-direction:column;
    gap:16px;
    box-shadow:0 1px 2px rgba(28,42,57,.04);
  }

  .card-head{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .lamp{
    width:12px;height:12px;border-radius:50%;
    flex-shrink:0;
    border:1.5px solid var(--line-strong);
    background:transparent;
    transition:background .2s ease, border-color .2s ease, box-shadow .2s ease;
  }
  .card.active .lamp{
    background:var(--gold);
    border-color:var(--gold-deep);
    box-shadow:0 0 0 3px rgba(244,211,94,.28);
  }
  .name-input{
    flex:1;
    font-family:'IBM Plex Sans',sans-serif;
    font-size:1.1rem;
    font-weight:600;
    color:var(--ink);
    border:none;
    background:transparent;
    padding:2px 0;
    border-bottom:1.5px solid transparent;
    outline:none;
    min-width:0;
  }
  .name-input:hover{border-bottom-color:var(--line);}
  .name-input:focus{border-bottom-color:var(--blue);}
  .name-input::placeholder{color:#B9B4A7;font-weight:500;}

  .status-tag{
    font-family:'IBM Plex Mono',monospace;
    font-size:.66rem;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--muted);
    white-space:nowrap;
  }
  .card.active .status-tag{color:var(--gold-deep);}

  .field label{
    display:block;
    font-size:.72rem;
    font-weight:600;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:6px;
  }

  .id-input{
    width:100%;
    font-family:'IBM Plex Mono',monospace;
    font-size:.85rem;
    color:var(--ink);
    background:#FAF8F2;
    border:1px solid var(--line);
    border-radius:7px;
    padding:9px 11px;
    outline:none;
    transition:border-color .15s ease, background .15s ease;
  }
  .id-input:focus{border-color:var(--blue);background:#fff;}
  .id-input::placeholder{color:#C3BEB1;}

  .content-input{
    width:100%;
    font-family:'IBM Plex Sans',sans-serif;
    font-size:.86rem;
    line-height:1.6;
    color:var(--ink);
    background:#FAF8F2;
    border:1px solid var(--line);
    border-radius:7px;
    padding:11px;
    outline:none;
    resize:vertical;
    min-height:150px;
    transition:border-color .15s ease, background .15s ease;
    white-space:pre-wrap;
  }
  .content-input:focus{border-color:var(--blue);background:#fff;}
  .content-input::placeholder{color:#C3BEB1;}

  .card-foot{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding-top:4px;
    border-top:1px solid var(--line);
    margin-top:2px;
  }
  .saved-hint{
    font-family:'IBM Plex Mono',monospace;
    font-size:.7rem;
    color:var(--muted);
    opacity:0;
    transition:opacity .2s ease;
  }
  .saved-hint.show{opacity:1;}
  .btn-del{
    font-family:'IBM Plex Sans',sans-serif;
    font-size:.78rem;
    font-weight:500;
    color:var(--muted);
    background:none;
    border:none;
    cursor:pointer;
    padding:6px 4px;
    border-radius:5px;
    transition:color .15s ease;
  }
  .btn-del:hover{color:var(--danger);}

  /* ---- Empty note ---- */
  .foot-note{
    margin-top:36px;
    padding:16px 18px;
    background:#FAF8F2;
    border:1px solid var(--line);
    border-left:3px solid var(--gold);
    border-radius:8px;
    font-size:.82rem;
    color:var(--muted);
    line-height:1.7;
  }
  .foot-note strong{color:var(--ink);font-weight:600;}

  /* ---- Focus visibility ---- */
  :focus-visible{outline:2px solid var(--blue);outline-offset:2px;}

  @media (max-width:520px){
    .wrap{padding:28px 16px 60px;}
    .grid{grid-template-columns:1fr;}
    .title-block h1{font-size:1.55rem;}
  }

  @media (prefers-reduced-motion:reduce){
    *{transition:none !important;}
  }
</style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div class="title-block">
        <span class="eyebrow">LINE BOT · 群組回報</span>
        <h1>報回設定台</h1>
        <p class="sub">每張卡片對應一個群組。填入群組 ID 後，狀態燈亮起，代表 bot 會在該群組發送設定的內容。</p>
      </div>
      <button class="btn-add" id="addBtn"><span class="plus">＋</span>新增卡片</button>
    </header>

    <div class="grid" id="grid"></div>

    <div class="foot-note">
      <strong>目前資料只存在這台裝置的瀏覽器裡。</strong> 你在這裡的新增與修改，別人打開同一個連結時看不到，也還沒有連動到 bot。若要「所有人共同編輯同一份、而且 bot 會照卡片動作」，需要再把這個頁面接上你的 GAS。
    </div>
  </div>

<script>
(function(){
  "use strict";

  var STORE_KEY = "reportCards_v1";

  // localStorage 在 GitHub Pages 正常運作；若環境不支援（例如預覽沙箱）則退回記憶體
  var memory = null;
  function readStore(){
    try{
      var raw = localStorage.getItem(STORE_KEY);
      return raw ? JSON.parse(raw) : null;
    }catch(e){ return memory; }
  }
  function writeStore(data){
    memory = data;
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(data)); }catch(e){}
  }

  function uid(){
    return "c" + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  }

  // 你既有的每日問題件回報內容（第一張卡片預設帶入）
  var DEFAULT_CONTENT =
"<<<每日問題件回報>>>\n" +
"日期：{{DATE}}\n" +
"超過六點後 問題件請自己入問題\n" +
"為了避免漏件 請配合!! 謝謝!!\n" +
"趙克強:\n牟善賢:\n詹益全:\n鄒樂勳:\n吳萌瑜:\n梁志強:\n" +
"温正杭:\n蔡俊傑:\n戴勝堂:\n郭香蘭:\n學長: \n" +
"--------------------請接龍";

  function seed(){
    return [
      { id:uid(), name:"每日問題件回報", groupId:"C421e973455a8031f78e9b151002707cf", content:DEFAULT_CONTENT },
      { id:uid(), name:"", groupId:"", content:"" }
    ];
  }

  var cards = readStore();
  if(!Array.isArray(cards)){ cards = seed(); writeStore(cards); }

  var grid = document.getElementById("grid");

  function save(){ writeStore(cards); }

  function flashSaved(el){
    if(!el) return;
    el.classList.add("show");
    clearTimeout(el._t);
    el._t = setTimeout(function(){ el.classList.remove("show"); }, 1100);
  }

  function render(){
    grid.innerHTML = "";
    cards.forEach(function(card){
      grid.appendChild(buildCard(card));
    });
  }

  function buildCard(card){
    var el = document.createElement("div");
    el.className = "card" + (card.groupId.trim() ? " active" : "");

    // head
    var head = document.createElement("div");
    head.className = "card-head";

    var lamp = document.createElement("span");
    lamp.className = "lamp";

    var nameInput = document.createElement("input");
    nameInput.className = "name-input";
    nameInput.type = "text";
    nameInput.value = card.name;
    nameInput.placeholder = "未命名卡片";
    nameInput.setAttribute("aria-label","卡片名稱");

    var statusTag = document.createElement("span");
    statusTag.className = "status-tag";

    head.appendChild(lamp);
    head.appendChild(nameInput);
    head.appendChild(statusTag);

    // ID field
    var idField = document.createElement("div");
    idField.className = "field";
    var idLabel = document.createElement("label");
    idLabel.textContent = "群組 ID";
    var idInput = document.createElement("input");
    idInput.className = "id-input";
    idInput.type = "text";
    idInput.value = card.groupId;
    idInput.placeholder = "C 開頭的群組 ID";
    idInput.spellcheck = false;
    idInput.setAttribute("aria-label","群組 ID");
    idField.appendChild(idLabel);
    idField.appendChild(idInput);

    // content field
    var cField = document.createElement("div");
    cField.className = "field";
    var cLabel = document.createElement("label");
    cLabel.textContent = "回報內容";
    var cInput = document.createElement("textarea");
    cInput.className = "content-input";
    cInput.value = card.content;
    cInput.placeholder = "在這裡貼上要發送的訊息內容";
    cInput.setAttribute("aria-label","回報內容");
    cField.appendChild(cLabel);
    cField.appendChild(cInput);

    // foot
    var foot = document.createElement("div");
    foot.className = "card-foot";
    var delBtn = document.createElement("button");
    delBtn.className = "btn-del";
    delBtn.textContent = "刪除卡片";
    var hint = document.createElement("span");
    hint.className = "saved-hint";
    hint.textContent = "已儲存";
    foot.appendChild(delBtn);
    foot.appendChild(hint);

    function refreshStatus(){
      if(card.groupId.trim()){
        el.classList.add("active");
        statusTag.textContent = "已啟用";
      }else{
        el.classList.remove("active");
        statusTag.textContent = "待設定";
      }
    }
    refreshStatus();

    nameInput.addEventListener("input", function(){
      card.name = nameInput.value; save(); flashSaved(hint);
    });
    idInput.addEventListener("input", function(){
      card.groupId = idInput.value; refreshStatus(); save(); flashSaved(hint);
    });
    cInput.addEventListener("input", function(){
      card.content = cInput.value; save(); flashSaved(hint);
    });
    delBtn.addEventListener("click", function(){
      var label = card.name.trim() || "這張卡片";
      if(confirm("確定刪除「" + label + "」嗎？此動作無法復原。")){
        cards = cards.filter(function(c){ return c.id !== card.id; });
        save(); render();
      }
    });

    el.appendChild(head);
    el.appendChild(idField);
    el.appendChild(cField);
    el.appendChild(foot);
    return el;
  }

  document.getElementById("addBtn").addEventListener("click", function(){
    cards.push({ id:uid(), name:"", groupId:"", content:"" });
    save(); render();
    // 捲到最後一張並聚焦名稱
    var last = grid.lastElementChild;
    if(last){
      last.scrollIntoView({behavior:"smooth", block:"center"});
      var nm = last.querySelector(".name-input");
      if(nm) nm.focus();
    }
  });

  render();
})();
</script>
</body>
</html>
