<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>報回設定台</title>
<style>
  :root{
    --canvas:#f6f8fa;          /* 頁面淡灰底 */
    --box:#ffffff;             /* 卡片白底 */
    --box-head:#f6f8fa;
    --border:#d0d7de;
    --border-muted:#d8dee4;
    --fg:#1f2328;
    --fg-muted:#656d76;
    --accent:#0969da;
    --success-fg:#1a7f37;
    --success-emphasis:#1f883d;
    --success-hover:#1a7f37;
    --success-subtle:#dafbe1;
    --success-border:rgba(31,136,61,.25);
    --danger:#cf222e;
    --warn-fg:#9a6700;
    --btn-border:rgba(31,35,40,.15);
    --shadow:0 1px 3px rgba(31,35,40,.06);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}

  body{
    background:var(--canvas);
    color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Helvetica,Arial,sans-serif;
    font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;
  }

  .wrap{max-width:1012px;margin:0 auto;padding:32px 24px 80px;}

  /* ---- Header ---- */
  header.top{
    display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
    padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:24px;
  }
  .title-block h1{font-size:20px;font-weight:600;margin:0 0 2px;letter-spacing:-.01em;}
  .title-block .sub{font-size:13px;color:var(--fg-muted);margin:0;max-width:640px;}
  .head-right{display:flex;align-items:center;gap:14px;}

  .sync{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--fg-muted);white-space:nowrap;}
  .sync .dot{width:8px;height:8px;border-radius:50%;background:#d0d7de;flex-shrink:0;}
  .sync[data-state="saved"] .dot{background:var(--success-emphasis);}
  .sync[data-state="saving"] .dot{background:var(--accent);}
  .sync[data-state="loading"] .dot{background:var(--accent);}
  .sync[data-state="error"] .dot{background:var(--danger);}
  .sync[data-state="local"] .dot{background:#d4a72c;}

  .btn{font-family:inherit;font-size:14px;font-weight:500;border-radius:6px;padding:5px 16px;cursor:pointer;line-height:20px;transition:background .12s ease;white-space:nowrap;}
  .btn-primary{color:#fff;background:var(--success-emphasis);border:1px solid var(--btn-border);box-shadow:var(--shadow);}
  .btn-primary:hover{background:var(--success-hover);}
  .btn-primary .plus{margin-right:6px;font-weight:600;}

  /* ---- Grid ---- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}

  /* ---- Card ---- */
  .card{background:var(--box);border:1px solid var(--border);border-radius:6px;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow);}
  .card-head{display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--box-head);border-bottom:1px solid var(--border);}
  .lamp{width:10px;height:10px;border-radius:50%;flex-shrink:0;background:#d0d7de;transition:background .2s ease,box-shadow .2s ease;}
  .card.active .lamp{background:var(--success-emphasis);box-shadow:0 0 0 3px var(--success-subtle);}
  .name-input{flex:1;min-width:0;font-family:inherit;font-size:14px;font-weight:600;color:var(--fg);border:1px solid transparent;background:transparent;padding:3px 6px;border-radius:6px;outline:none;transition:border-color .12s ease,background .12s ease;}
  .name-input:hover{border-color:var(--border);}
  .name-input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(9,105,218,.12);}
  .name-input::placeholder{color:#8c959f;font-weight:500;}
  .badge{font-size:12px;font-weight:500;padding:1px 8px;border-radius:2em;border:1px solid var(--border);color:var(--fg-muted);background:var(--box);white-space:nowrap;}
  .card.active .badge{color:var(--success-fg);background:var(--success-subtle);border-color:var(--success-border);}

  .card-body{padding:16px;display:flex;flex-direction:column;gap:14px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--fg);margin-bottom:6px;}
  .txt{width:100%;font-family:inherit;font-size:13px;color:var(--fg);background:var(--box);border:1px solid var(--border);border-radius:6px;padding:7px 12px;outline:none;transition:border-color .12s ease,box-shadow .12s ease;}
  .txt:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(9,105,218,.12);}
  .txt::placeholder{color:#8c959f;}
  .mono{font-family:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;font-size:12px;}
  textarea.txt{resize:vertical;min-height:150px;line-height:1.55;white-space:pre-wrap;}

  .missing{font-size:12px;color:var(--warn-fg);margin:-4px 0 0;min-height:0;}

  .card-foot{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:1px solid var(--border-muted);background:var(--box);}
  .saved-hint{font-size:12px;color:var(--fg-muted);opacity:0;transition:opacity .2s ease;}
  .saved-hint.show{opacity:1;}
  .saved-hint::before{content:"✓ ";color:var(--success-fg);}
  .btn-del{font-family:inherit;font-size:13px;color:var(--fg-muted);background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:6px;transition:color .12s ease,background .12s ease;}
  .btn-del:hover{color:var(--danger);background:#faeeee;}

  .foot-note{margin-top:28px;padding:12px 16px;background:var(--box);border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--fg-muted);line-height:1.7;}
  .foot-note strong{color:var(--fg);font-weight:600;}

  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

  @media (max-width:520px){.wrap{padding:24px 16px 60px;}.grid{grid-template-columns:1fr;}.head-right{width:100%;justify-content:space-between;}}
  @media (prefers-reduced-motion:reduce){*{transition:none !important;}}
</style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div class="title-block">
        <h1>報回設定台</h1>
        <p class="sub">每張卡片對應一個群組與一個觸發關鍵字。三欄都填好後狀態燈亮起，bot 會在該群組收到相符關鍵字時發送內容。同一群組可建立多張卡片，用不同關鍵字觸發不同訊息。</p>
      </div>
      <div class="head-right">
        <div class="sync" id="sync" data-state="local"><span class="dot"></span><span id="syncText">僅存本機</span></div>
        <button class="btn btn-primary" id="addBtn"><span class="plus">＋</span>新增卡片</button>
      </div>
    </header>

    <div class="grid" id="grid"></div>

    <div class="foot-note" id="footNote"></div>
  </div>

<script>
(function(){
  "use strict";

  // ============================================================
  // ⚠️ 貼上你的 GAS 網頁應用程式網址（結尾是 /exec）。留空 = 只存本機不同步。
  var GAS_URL = "";
  // ============================================================

  var STORE_KEY = "reportCards_v1";
  var memory = null;

  function readLocal(){
    try{ var raw = localStorage.getItem(STORE_KEY); return raw ? JSON.parse(raw) : null; }
    catch(e){ return memory; }
  }
  function writeLocal(data){ memory = data; try{ localStorage.setItem(STORE_KEY, JSON.stringify(data)); }catch(e){} }
  function uid(){ return "c" + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

  var DEFAULT_CONTENT =
"<<<每日問題件回報>>>\n" +
"日期：{{DATE}}\n" +
"超過六點後 問題件請自己入問題\n" +
"為了避免漏件 請配合!! 謝謝!!\n" +
"趙克強:\n牟善賢:\n詹益全:\n鄒樂勳:\n吳萌瑜:\n梁志強:\n" +
"温正杭:\n蔡俊傑:\n戴勝堂:\n郭香蘭:\n學長: \n" +
"--------------------請接龍";

  function seed(){
    return [
      { id:uid(), name:"每日問題件回報", groupId:"C421e973455a8031f78e9b151002707cf", keyword:"回報0", content:DEFAULT_CONTENT },
      { id:uid(), name:"", groupId:"", keyword:"", content:"" }
    ];
  }
  function normalize(){ cards.forEach(function(c){ if(typeof c.keyword==="undefined") c.keyword=""; if(!c.id) c.id=uid(); }); }

  var cards = [];
  var grid = document.getElementById("grid");
  var syncEl = document.getElementById("sync");
  var syncText = document.getElementById("syncText");
  var footNote = document.getElementById("footNote");

  function setSync(state){
    var map = { loading:"連線中…", saving:"同步中…", saved:"已同步", error:"同步失敗", local:"僅存本機" };
    syncEl.setAttribute("data-state", state);
    syncText.textContent = map[state] || "";
  }

  function setFootNote(){
    if(GAS_URL){
      footNote.innerHTML = "<strong>已連接 GAS。</strong> 這裡的變更會同步到雲端，所有打開此連結的人共用同一份資料，bot 也會依卡片動作。多人同時編輯時以最後儲存者為準。";
    }else{
      footNote.innerHTML = "<strong>尚未連接 GAS（僅存本機）。</strong> 目前變更只留在這台裝置，別人看不到、bot 也讀不到。把上方程式碼裡的 GAS_URL 填好即可啟用同步。";
    }
  }

  // ---------- 與 GAS 溝通 ----------
  function jsonpLoad(cb){
    var fn = "cb_" + Date.now() + Math.floor(Math.random()*1000);
    var s = document.createElement("script");
    var done = false;
    window[fn] = function(data){ done=true; try{ cb(data); }finally{ delete window[fn]; s.remove(); } };
    s.onerror = function(){ if(!done){ delete window[fn]; s.remove(); cb(null);} };
    s.src = GAS_URL + "?action=listCards&callback=" + fn + "&_=" + Date.now();
    document.body.appendChild(s);
    setTimeout(function(){ if(!done){ delete window[fn]; s.remove(); cb(null);} }, 8000);
  }

  var saveTimer = null;
  function serverSave(){
    if(!GAS_URL) return;
    setSync("saving");
    fetch(GAS_URL, {
      method:"POST", mode:"no-cors",
      headers:{ "Content-Type":"text/plain;charset=utf-8" },
      body: JSON.stringify({ action:"saveCards", cards:cards })
    }).then(function(){ setSync("saved"); }).catch(function(){ setSync("error"); });
  }

  // 每次變更：立即存本機 + 排程同步到雲端
  function persist(){
    writeLocal(cards);
    if(!GAS_URL){ setSync("local"); return; }
    clearTimeout(saveTimer);
    setSync("saving");
    saveTimer = setTimeout(serverSave, 800);
  }

  function flashSaved(el){
    if(!el) return;
    el.classList.add("show");
    clearTimeout(el._t);
    el._t = setTimeout(function(){ el.classList.remove("show"); }, 1100);
  }

  function render(){
    grid.innerHTML = "";
    cards.forEach(function(card){ grid.appendChild(buildCard(card)); });
  }

  function buildCard(card){
    var el = document.createElement("div");
    el.className = "card";

    var head = document.createElement("div");
    head.className = "card-head";
    var lamp = document.createElement("span"); lamp.className = "lamp";
    var nameInput = document.createElement("input");
    nameInput.className="name-input"; nameInput.type="text"; nameInput.value=card.name;
    nameInput.placeholder="未命名卡片"; nameInput.setAttribute("aria-label","卡片名稱");
    var badge = document.createElement("span"); badge.className="badge";
    head.appendChild(lamp); head.appendChild(nameInput); head.appendChild(badge);

    var body = document.createElement("div"); body.className="card-body";
    function makeField(labelText, value, placeholder, opts){
      opts = opts||{};
      var field=document.createElement("div"); field.className="field";
      var label=document.createElement("label"); label.textContent=labelText;
      var input=opts.multiline?document.createElement("textarea"):document.createElement("input");
      if(!opts.multiline) input.type="text";
      input.className="txt"+(opts.mono?" mono":""); input.value=value; input.placeholder=placeholder;
      if(opts.mono) input.spellcheck=false;
      input.setAttribute("aria-label",labelText);
      field.appendChild(label); field.appendChild(input);
      return { field:field, input:input };
    }
    var idF = makeField("群組 ID", card.groupId, "C 開頭的群組 ID", {mono:true});
    var kwF = makeField("觸發關鍵字", card.keyword, "例如：回報0", {mono:true});
    var cF  = makeField("回報內容", card.content, "在這裡貼上要發送的訊息內容", {multiline:true});
    var missing = document.createElement("p"); missing.className="missing";
    body.appendChild(idF.field); body.appendChild(kwF.field); body.appendChild(cF.field); body.appendChild(missing);

    var foot = document.createElement("div"); foot.className="card-foot";
    var delBtn = document.createElement("button"); delBtn.className="btn-del"; delBtn.textContent="刪除卡片";
    var hint = document.createElement("span"); hint.className="saved-hint"; hint.textContent="已儲存";
    foot.appendChild(delBtn); foot.appendChild(hint);

    function refreshStatus(){
      var miss=[];
      if(!card.groupId.trim()) miss.push("群組 ID");
      if(!card.keyword.trim()) miss.push("觸發關鍵字");
      if(!card.content.trim()) miss.push("回報內容");
      if(miss.length===0){ el.classList.add("active"); badge.textContent="已啟用"; missing.textContent=""; }
      else{ el.classList.remove("active"); badge.textContent="待設定"; missing.textContent="尚未填寫："+miss.join("、"); }
    }
    refreshStatus();

    nameInput.addEventListener("input", function(){ card.name=nameInput.value; persist(); flashSaved(hint); });
    idF.input.addEventListener("input", function(){ card.groupId=idF.input.value; refreshStatus(); persist(); flashSaved(hint); });
    kwF.input.addEventListener("input", function(){ card.keyword=kwF.input.value; refreshStatus(); persist(); flashSaved(hint); });
    cF.input.addEventListener("input", function(){ card.content=cF.input.value; refreshStatus(); persist(); flashSaved(hint); });
    delBtn.addEventListener("click", function(){
      var label=card.name.trim()||"這張卡片";
      if(confirm("確定刪除「"+label+"」嗎？此動作無法復原。")){
        cards=cards.filter(function(c){return c.id!==card.id;}); persist(); render();
      }
    });

    el.appendChild(head); el.appendChild(body); el.appendChild(foot);
    return el;
  }

  document.getElementById("addBtn").addEventListener("click", function(){
    cards.push({ id:uid(), name:"", groupId:"", keyword:"", content:"" });
    persist(); render();
    var last=grid.lastElementChild;
    if(last){ last.scrollIntoView({behavior:"smooth",block:"center"}); var nm=last.querySelector(".name-input"); if(nm) nm.focus(); }
  });

  // ---------- 啟動 ----------
  setFootNote();
  if(GAS_URL){
    setSync("loading");
    jsonpLoad(function(data){
      if(data && Array.isArray(data.cards) && data.cards.length){
        cards = data.cards; normalize(); writeLocal(cards); setSync("saved");
      }else{
        cards = readLocal(); if(!Array.isArray(cards)) cards = seed(); normalize(); writeLocal(cards);
        serverSave();  // 把初始資料推上雲端
      }
      render();
    });
  }else{
    cards = readLocal(); if(!Array.isArray(cards)) cards = seed(); normalize();
    setSync("local"); render();
  }
})();
</script>
</body>
</html>
