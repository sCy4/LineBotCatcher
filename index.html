<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>單號捕手 - 回報內容設定台</title>
<style>
  :root{
    --canvas:#f6f8fa;
    --box:#ffffff;
    --border:#d0d7de;
    --border-muted:#d8dee4;
    --fg:#1f2328;
    --fg-muted:#656d76;
    --brand:#0f4c81;                 /* 經典藍 Classic Blue 19-4052 TCX */
    --brand-hover:#0d4271;
    --accent:#0f4c81;                /* 互動色（focus / 進行中）用經典藍 */
    --success-fg:#1a7f37;
    --success-emphasis:#1f883d;
    --success-hover:#1a7f37;
    --success-subtle:#dafbe1;
    --success-border:rgba(31,136,61,.25);
    --live:#3fb950;                  /* 藍底上的「已啟用」亮綠燈 */
    --danger:#cf222e;
    --warn-fg:#9a6700;
    --warn-dot:#d4a72c;
    --btn-border:rgba(31,35,40,.15);
    --shadow:0 1px 3px rgba(31,35,40,.06);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--canvas);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Helvetica,Arial,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1012px;margin:0 auto;padding:32px 24px 80px;}

  /* ---- Header ---- */
  header.top{padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:16px;}
  .title-block{border-left:3px solid var(--brand);padding-left:14px;}
  .title-block h1{font-size:20px;font-weight:600;margin:0 0 2px;letter-spacing:-.01em;}
  .title-block .sub{font-size:13px;color:var(--fg-muted);margin:0;max-width:660px;}

  /* ---- Toolbar (top) ---- */
  .toolbar{
    display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
    margin-bottom:20px;
  }
  .status{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--fg-muted);white-space:nowrap;}
  .status .dot{width:9px;height:9px;border-radius:50%;background:#d0d7de;flex-shrink:0;}
  .status[data-state="clean"] .dot{background:var(--success-emphasis);}
  .status[data-state="dirty"] .dot{background:var(--warn-dot);}
  .status[data-state="saving"] .dot,.status[data-state="loading"] .dot{background:var(--accent);}
  .status[data-state="error"] .dot{background:var(--danger);}
  .status[data-state="readonly"] .dot{background:var(--fg-muted);}
  .status[data-state="dirty"]{color:var(--warn-fg);}
  .status[data-state="error"]{color:var(--danger);}

  .actions{display:flex;align-items:center;gap:8px;}
  .btn{font-family:inherit;font-size:14px;font-weight:500;border-radius:6px;padding:5px 16px;cursor:pointer;line-height:20px;transition:background .12s ease,border-color .12s ease,opacity .12s ease;white-space:nowrap;}
  .btn:disabled{cursor:default;opacity:.55;}
  .btn-default{color:var(--fg);background:var(--box);border:1px solid var(--border);box-shadow:var(--shadow);}
  .btn-default:not(:disabled):hover{background:#f3f4f6;}
  .btn-primary{color:#fff;background:var(--brand);border:1px solid var(--btn-border);box-shadow:var(--shadow);}
  .btn-primary:not(:disabled):hover{background:var(--brand-hover);}

  /* ---- Grid ---- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}

  /* ---- Card ---- */
  .card{background:var(--box);border:1px solid var(--border);border-radius:6px;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow);}
  /* 深藍：標題列經典藍實底 + 白字 */
  .card-head{display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--brand);border-bottom:1px solid rgba(0,0,0,.08);}
  .lamp{width:10px;height:10px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,.5);transition:background .2s ease,box-shadow .2s ease;}
  .card.active .lamp{background:var(--live);box-shadow:0 0 0 3px rgba(63,185,80,.3);}
  .name-input{flex:1;min-width:0;font-family:inherit;font-size:14px;font-weight:600;color:#fff;border:1px solid transparent;background:transparent;padding:3px 6px;border-radius:6px;outline:none;transition:border-color .12s ease,background .12s ease;}
  .name-input:hover{border-color:rgba(255,255,255,.4);}
  .name-input:focus{border-color:rgba(255,255,255,.8);background:rgba(255,255,255,.14);box-shadow:0 0 0 3px rgba(255,255,255,.18);}
  .name-input::placeholder{color:rgba(255,255,255,.6);font-weight:500;}
  .name-input[readonly]{cursor:default;}
  .name-input[readonly]:hover{border-color:transparent;background:transparent;}
  .badge{font-size:12px;font-weight:500;padding:1px 8px;border-radius:2em;border:1px solid rgba(255,255,255,.35);color:#fff;background:rgba(255,255,255,.15);white-space:nowrap;}
  .card.active .badge{color:var(--success-fg);background:var(--success-subtle);border-color:var(--success-border);}

  .card-body{padding:16px;display:flex;flex-direction:column;gap:14px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--fg);margin-bottom:6px;}
  .txt{width:100%;font-family:inherit;font-size:13px;color:var(--fg);background:var(--box);border:1px solid var(--border);border-radius:6px;padding:7px 12px;outline:none;transition:border-color .12s ease,box-shadow .12s ease;}
  .txt:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(15,76,129,.15);}
  .txt::placeholder{color:#8c959f;}
  /* 唯讀外觀：底色微調，但文字維持清晰好讀 */
  .txt[readonly]{background:var(--canvas);cursor:default;}
  .txt[readonly]:focus{border-color:var(--border);box-shadow:none;}
  .mono{font-family:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;font-size:12px;}
  textarea.txt{resize:vertical;min-height:150px;line-height:1.55;white-space:pre-wrap;}
  .missing{font-size:12px;color:var(--warn-fg);margin:-4px 0 0;min-height:0;}

  .card-foot{display:flex;align-items:center;justify-content:flex-end;padding:10px 16px;border-top:1px solid var(--border-muted);background:var(--box);}
  .btn-del{font-family:inherit;font-size:13px;color:var(--fg-muted);background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:6px;transition:color .12s ease,background .12s ease;}
  .btn-del:hover{color:var(--danger);background:#faeeee;}

  /* ---- Add (bottom) ---- */
  .add-row{margin-top:18px;}
  .btn-add{font-family:inherit;font-size:14px;font-weight:500;color:var(--fg);background:var(--box);border:1px dashed var(--border);border-radius:6px;padding:10px 18px;cursor:pointer;transition:background .12s ease,border-color .12s ease,color .12s ease;width:100%;}
  .btn-add:hover{background:#f3f4f6;border-color:var(--brand);color:var(--brand);}
  .btn-add .plus{margin-right:6px;font-weight:600;}

  /* 唯讀模式時隱藏編輯專用元件 */
  body.read-only .add-row{display:none;}
  body.read-only #saveBtn{display:none;}

  .foot-note{margin-top:28px;padding:12px 16px;background:var(--box);border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--fg-muted);line-height:1.7;}
  .foot-note strong{color:var(--fg);font-weight:600;}

  /* ---- 密碼視窗 ---- */
  .modal-mask{position:fixed;inset:0;background:rgba(31,35,40,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
  .modal-mask[hidden]{display:none;}
  .modal{background:var(--box);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(31,35,40,.2);width:100%;max-width:360px;padding:22px;}
  .modal h2{font-size:16px;font-weight:600;margin:0 0 6px;}
  .modal .desc{font-size:13px;color:var(--fg-muted);margin:0 0 14px;}
  .modal .pw-err{font-size:12px;color:var(--danger);min-height:16px;margin:8px 0 0;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}

  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  @media (max-width:520px){.wrap{padding:24px 16px 60px;}.grid{grid-template-columns:1fr;}.toolbar{align-items:stretch;}.actions{width:100%;}.actions .btn{flex:1;}}
  @media (prefers-reduced-motion:reduce){*{transition:none !important;}}
</style>
</head>
<body class="read-only">
  <div class="wrap">
    <header class="top">
      <div class="title-block">
        <h1>單號捕手 - 回報內容設定台</h1>
        <p class="sub">在群組中輸入觸發關鍵字，單號捕手就會回報設定好的文字內容。</p>
      </div>
    </header>

    <div class="toolbar">
      <div class="status" id="status" data-state="readonly"><span class="dot"></span><span id="statusText">檢視模式</span></div>
      <div class="actions">
        <button class="btn btn-default" id="reloadBtn">重新載入</button>
        <button class="btn btn-primary" id="saveBtn" disabled>儲存</button>
        <button class="btn btn-default" id="editToggle">進入編輯模式</button>
      </div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="add-row">
      <button class="btn-add" id="addBtn"><span class="plus">＋</span>新增卡片</button>
    </div>

    <div class="foot-note" id="footNote"></div>
  </div>

  <!-- 密碼視窗 -->
  <div class="modal-mask" id="pwMask" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="pwTitle">
      <h2 id="pwTitle">進入編輯模式</h2>
      <p class="desc">請輸入密碼</p>
      <input type="password" id="pwInput" class="txt" placeholder="密碼" autocomplete="off" aria-label="密碼">
      <p class="pw-err" id="pwErr"></p>
      <div class="modal-actions">
        <button class="btn btn-default" id="pwCancel">取消</button>
        <button class="btn btn-primary" id="pwOk">確認</button>
      </div>
    </div>
  </div>

<script>
(function(){
  "use strict";

  // ============================================================
  // ⚠️ 貼上你的 GAS 網頁應用程式網址（結尾是 /exec）。留空 = 只存本機不同步。
  var GAS_URL = "https://script.google.com/macros/s/AKfycbztxBVKzhh4p-e3TV8xo5LiDt51YMQ9x-JLL69I2r42Y6q8fbSEEDFoE3_cWw1OtA1m/exec";

  // ⚠️ 進入編輯模式的密碼，請改成你自己的。留空字串 "" 則等同不設密碼。
  var EDIT_PASSWORD = "8531";
  // ============================================================

  var STORE_KEY = "reportCards_v1";   // 已「儲存」的基準版本（不隨打字更新）
  var memory = null;

  function readLocal(){
    try{ var raw = localStorage.getItem(STORE_KEY); return raw ? JSON.parse(raw) : null; }
    catch(e){ return memory; }
  }
  function writeLocal(data){ memory = data; try{ localStorage.setItem(STORE_KEY, JSON.stringify(data)); }catch(e){} }
  function uid(){ return "c" + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
  function clone(x){ return JSON.parse(JSON.stringify(x)); }

  var DEFAULT_CONTENT =
"<<<每日問題件回報>>>\n" +
"日期：{{DATE}}\n" +
"超過六點後 問題件請自己入問題\n" +
"為了避免漏件 請配合!! 謝謝!!\n" +
"趙克強:\n牟善賢:\n詹益全:\n鄒樂勳:\n吳萌瑜:\n梁志強:\n" +
"温正杭:\n蔡俊傑:\n戴勝堂:\n郭香蘭:\n學長: \n" +
"--------------------請接龍";

  function seed(){
    return [
      { id:uid(), name:"每日問題件回報", groupId:"C421e973455a8031f78e9b151002707cf", keyword:"回報0", content:DEFAULT_CONTENT },
      { id:uid(), name:"", groupId:"", keyword:"", content:"" }
    ];
  }
  function normalize(list){
    (list||[]).forEach(function(c){
      if(typeof c.keyword==="undefined") c.keyword="";
      if(typeof c.name==="undefined") c.name="";
      if(typeof c.groupId==="undefined") c.groupId="";
      if(typeof c.content==="undefined") c.content="";
      if(!c.id) c.id=uid();
    });
    return list;
  }

  // ---- 狀態 ----
  var cards = [];
  var dirty = false;
  var busy = false;      // 儲存/載入進行中
  var editMode = false;  // false = 唯讀，true = 可編輯

  var grid = document.getElementById("grid");
  var statusEl = document.getElementById("status");
  var statusText = document.getElementById("statusText");
  var saveBtn = document.getElementById("saveBtn");
  var reloadBtn = document.getElementById("reloadBtn");
  var addBtn = document.getElementById("addBtn");
  var editToggle = document.getElementById("editToggle");
  var footNote = document.getElementById("footNote");
  var pwMask = document.getElementById("pwMask");
  var pwInput = document.getElementById("pwInput");
  var pwErr = document.getElementById("pwErr");
  var pwOk = document.getElementById("pwOk");
  var pwCancel = document.getElementById("pwCancel");

  function setStatus(state){
    var map = {
      clean:  GAS_URL ? "已同步" : "已儲存（本機）",
      dirty:  "有未儲存的變更",
      saving: "儲存中…",
      loading:"載入中…",
      error:  "儲存失敗，請重試"
    };
    statusEl.setAttribute("data-state", state);
    statusText.textContent = map[state] || "";
  }
  // 靜止狀態下的狀態列文字（依模式而定）
  function refreshStatusDisplay(){
    if(!editMode){
      statusEl.setAttribute("data-state","readonly");
      statusText.textContent = "檢視模式";
    }else{
      setStatus(dirty ? "dirty" : "clean");
    }
  }
  function refreshButtons(){
    saveBtn.disabled = busy || !dirty;
    reloadBtn.disabled = busy;
    addBtn.disabled = busy;
    editToggle.disabled = busy;
  }
  function markDirty(){
    dirty = true;
    setStatus("dirty");
    refreshButtons();
  }
  function markClean(){
    dirty = false;
    refreshStatusDisplay();
    refreshButtons();
  }

  // 套用目前模式（唯讀 / 編輯）到整個畫面
  function applyMode(){
    document.body.classList.toggle("read-only", !editMode);
    editToggle.textContent = editMode ? "離開編輯" : "進入編輯";
    refreshStatusDisplay();
    refreshButtons();
    render();
  }

  function setFootNote(){
    var lock = "頁面預設為<strong>檢視模式</strong>，進入編輯模式才能修改、新增或刪除卡片。";
    var body = GAS_URL
      ? "<strong>已連接 GAS</strong> 編輯完成後按下「儲存」才會套用更新。所有人共用同一份資料，修改時，以最後按下儲存的版本為準。按「重新載入」以載入最新版本。回報內容中的 {{DATE}} 會呈現當天的月日，如：7/21。"
      : "<strong>尚未連接 GAS（僅存本機）</strong> 變更只留在這台裝置。把 GAS 程式碼裡的 GAS_URL 填好即可啟用雲端同步。";
    footNote.innerHTML = lock + "<br>" + body;
  }

  // ---- 密碼視窗 ----
  function openPw(){
    pwInput.value = ""; pwErr.textContent = "";
    pwMask.hidden = false;
    setTimeout(function(){ pwInput.focus(); }, 0);
  }
  function closePw(){ pwMask.hidden = true; }
  function tryPw(){
    if(pwInput.value === EDIT_PASSWORD){
      editMode = true; closePw(); applyMode();
    }else{
      pwErr.textContent = "密碼不正確，請再試一次。";
      pwInput.select();
    }
  }

  // ---- 與 GAS 溝通 ----
  function jsonpLoad(cb){
    if(!GAS_URL){ cb(null); return; }
    var fn = "cb_" + Date.now() + Math.floor(Math.random()*1000);
    var s = document.createElement("script");
    var done = false;
    window[fn] = function(data){ done=true; try{ cb(data); }finally{ delete window[fn]; s.remove(); } };
    s.onerror = function(){ if(!done){ delete window[fn]; s.remove(); cb(null);} };
    s.src = GAS_URL + "?action=listCards&callback=" + fn + "&_=" + Date.now();
    document.body.appendChild(s);
    setTimeout(function(){ if(!done){ delete window[fn]; s.remove(); cb(null);} }, 8000);
  }
  function serverSave(){
    return fetch(GAS_URL, {
      method:"POST", mode:"no-cors",
      headers:{ "Content-Type":"text/plain;charset=utf-8" },
      body: JSON.stringify({ action:"saveCards", cards:cards })
    });
  }

  // ---- 儲存 / 重新載入 ----
  function doSave(){
    if(busy || !dirty) return;
    busy = true; setStatus("saving"); refreshButtons();
    if(!GAS_URL){
      writeLocal(clone(cards)); busy = false; markClean(); return;
    }
    serverSave().then(function(){
      writeLocal(clone(cards)); busy = false; markClean();
    }).catch(function(){
      busy = false; setStatus("error"); refreshButtons();
    });
  }

  function doReload(){
    if(busy) return;
    if(dirty && !confirm("有未儲存的變更，重新載入會捨棄它們，確定要繼續嗎？")) return;
    busy = true; setStatus("loading"); refreshButtons();
    if(!GAS_URL){
      cards = normalize(readLocal() || seed());
      busy = false; markClean(); render(); return;
    }
    jsonpLoad(function(data){
      if(data && Array.isArray(data.cards)){
        cards = normalize(data.cards);
        writeLocal(clone(cards));
      }else{
        cards = normalize(readLocal() || seed());
      }
      busy = false; markClean(); render();
    });
  }

  // ---- 卡片畫面 ----
  function render(){
    grid.innerHTML = "";
    cards.forEach(function(card){ grid.appendChild(buildCard(card)); });
  }

  function buildCard(card){
    var ro = !editMode;   // 唯讀
    var el = document.createElement("div"); el.className = "card";

    var head = document.createElement("div"); head.className = "card-head";
    var lamp = document.createElement("span"); lamp.className = "lamp";
    var nameInput = document.createElement("input");
    nameInput.className="name-input"; nameInput.type="text"; nameInput.value=card.name;
    nameInput.placeholder="未命名卡片"; nameInput.setAttribute("aria-label","卡片名稱");
    nameInput.readOnly = ro;
    var badge = document.createElement("span"); badge.className="badge";
    head.appendChild(lamp); head.appendChild(nameInput); head.appendChild(badge);

    var body = document.createElement("div"); body.className="card-body";
    function makeField(labelText, value, placeholder, opts){
      opts = opts||{};
      var field=document.createElement("div"); field.className="field";
      var label=document.createElement("label"); label.textContent=labelText;
      var input=opts.multiline?document.createElement("textarea"):document.createElement("input");
      if(!opts.multiline) input.type="text";
      input.className="txt"+(opts.mono?" mono":""); input.value=value; input.placeholder=placeholder;
      if(opts.mono) input.spellcheck=false;
      input.readOnly = ro;
      input.setAttribute("aria-label",labelText);
      field.appendChild(label); field.appendChild(input);
      return { field:field, input:input };
    }
    var idF = makeField("群組 ID", card.groupId, "在群組中發送「查ID」以取得該群組ID", {mono:true});
    var kwF = makeField("觸發關鍵字", card.keyword, "輸入此關鍵字以觸發回報", {mono:true});
    var cF  = makeField("回報內容", card.content, "在這裡輸入回報內容", {multiline:true});
    var missing = document.createElement("p"); missing.className="missing";
    body.appendChild(idF.field); body.appendChild(kwF.field); body.appendChild(cF.field); body.appendChild(missing);

    var foot = document.createElement("div"); foot.className="card-foot";
    foot.hidden = ro;   // 唯讀時隱藏刪除區
    var delBtn = document.createElement("button"); delBtn.className="btn-del"; delBtn.textContent="刪除卡片";
    foot.appendChild(delBtn);

    function refreshStatus(){
      var miss=[];
      if(!card.groupId.trim()) miss.push("群組 ID");
      if(!card.keyword.trim()) miss.push("觸發關鍵字");
      if(!card.content.trim()) miss.push("回報內容");
      if(miss.length===0){ el.classList.add("active"); badge.textContent="已啟用"; missing.textContent=""; }
      else{ el.classList.remove("active"); badge.textContent="待設定"; missing.textContent="尚未填寫："+miss.join("、"); }
    }
    refreshStatus();

    nameInput.addEventListener("input", function(){ card.name=nameInput.value; markDirty(); });
    idF.input.addEventListener("input", function(){ card.groupId=idF.input.value; refreshStatus(); markDirty(); });
    kwF.input.addEventListener("input", function(){ card.keyword=kwF.input.value; refreshStatus(); markDirty(); });
    cF.input.addEventListener("input", function(){ card.content=cF.input.value; refreshStatus(); markDirty(); });
    delBtn.addEventListener("click", function(){
      var label=card.name.trim()||"這張卡片";
      if(confirm("確定刪除「"+label+"」嗎？（要按「儲存」後才會真正套用）")){
        cards=cards.filter(function(c){return c.id!==card.id;}); markDirty(); render();
      }
    });

    el.appendChild(head); el.appendChild(body); el.appendChild(foot);
    return el;
  }

  addBtn.addEventListener("click", function(){
    if(busy || !editMode) return;
    cards.push({ id:uid(), name:"", groupId:"", keyword:"", content:"" });
    markDirty(); render();
    var last=grid.lastElementChild;
    if(last){ last.scrollIntoView({behavior:"smooth",block:"center"}); var nm=last.querySelector(".name-input"); if(nm) nm.focus(); }
  });
  saveBtn.addEventListener("click", doSave);
  reloadBtn.addEventListener("click", doReload);

  // 進入 / 離開編輯模式
  editToggle.addEventListener("click", function(){
    if(busy) return;
    if(!editMode){ openPw(); return; }
    // 離開編輯模式
    if(dirty){
      if(!confirm("有未儲存的變更，離開編輯模式會捨棄它們，確定嗎？")) return;
      cards = normalize(readLocal() || seed());  // 還原成上次儲存的版本
      dirty = false;
    }
    editMode = false;
    applyMode();
  });

  // 密碼視窗事件
  pwOk.addEventListener("click", tryPw);
  pwCancel.addEventListener("click", closePw);
  pwInput.addEventListener("keydown", function(e){
    if(e.key==="Enter"){ e.preventDefault(); tryPw(); }
    else if(e.key==="Escape"){ closePw(); }
  });
  pwMask.addEventListener("click", function(e){ if(e.target===pwMask) closePw(); });

  // 離開前提醒未儲存變更
  window.addEventListener("beforeunload", function(e){
    if(dirty){ e.preventDefault(); e.returnValue=""; }
  });

  // ---- 啟動 ----
  setFootNote();
  applyMode();   // 先套用唯讀基準畫面
  if(GAS_URL){
    busy = true; setStatus("loading"); refreshButtons();
    jsonpLoad(function(data){
      if(data && Array.isArray(data.cards) && data.cards.length){
        cards = normalize(data.cards); writeLocal(clone(cards));
      }else{
        cards = normalize(readLocal() || seed()); writeLocal(clone(cards));
        // 首次：把初始資料推上雲端
        serverSave().catch(function(){});
      }
      busy = false; markClean(); render();
    });
  }else{
    cards = normalize(readLocal() || seed());
    writeLocal(clone(cards));
    busy = false; markClean(); render();
  }
})();
</script>
</body>
</html>
